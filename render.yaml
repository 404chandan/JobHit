services:
  # JobHit Web Portal (Landing, Auth, QR Payment, and Desktop Download)
  - type: web
    name: jobhit-web-portal
    env: node
    plan: free
    buildCommand: npm install --prefix web-portal/frontend && npm run build --prefix web-portal/frontend && npm install --prefix web-portal/backend && npm run build --prefix web-portal/backend && npx prisma generate --schema=web-portal/backend/prisma/schema.prisma
    startCommand: npx prisma db push --schema=web-portal/backend/prisma/schema.prisma && node web-portal/backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # User will paste their MongoDB Atlas Connection URI for the portal DB
      - key: JWT_SECRET
        sync: false # User will configure their JWT authentication signing key
